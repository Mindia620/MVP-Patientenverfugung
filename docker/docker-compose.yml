version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vorsorge
      POSTGRES_PASSWORD: vorsorge_dev
      POSTGRES_DB: vorsorge_wizard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vorsorge"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
