services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vorsorge_wizard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    environment:
      NODE_ENV: development
      PORT: 4000
      FRONTEND_URL: http://localhost:5173
      JWT_SECRET: dev-only-change-this
      BCRYPT_ROUNDS: 12
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vorsorge_wizard?schema=public
    ports:
      - "4000:4000"
    depends_on:
      - postgres

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
