version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: vorsorge-postgres
    environment:
      POSTGRES_USER: vorsorge
      POSTGRES_PASSWORD: vorsorge_secret
      POSTGRES_DB: vorsorge_wizard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vorsorge -d vorsorge_wizard"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: vorsorge-backend
    environment:
      DATABASE_URL: postgresql://vorsorge:vorsorge_secret@postgres:5432/vorsorge_wizard
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      NODE_ENV: production
      FRONTEND_URL: http://localhost:5173
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: vorsorge-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
